<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modulo Tesseramento 2026</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

    <h1 style="color:#1A4C8F; margin-bottom:20px;">Richiesta di Tesseramento – Stagione 2026</h1>

    <!-- ============================
         SEZIONE TITOLARE
    ============================= -->
    <div class="section-title">Dati del Titolare</div>

    <div class="grid-3">
        <div>
            <label for="grado">Grado</label>
            <select id="grado"></select>
        </div>

        <div>
            <label for="cognome">Cognome</label>
            <input type="text" id="cognome">
        </div>

        <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome">
        </div>
    </div>

    <div class="grid-2">
        <div>
            <label for="email">Email</label>
            <input type="email" id="email">
        </div>

        <div>
            <label for="telefono">Telefono</label>
            <input type="text" id="telefono">
        </div>
    </div>

    <div class="grid-3">
        <div>
            <label for="indirizzo">Indirizzo</label>
            <input type="text" id="indirizzo">
        </div>

        <div>
            <label for="provincia">Provincia</label>
            <input type="text" id="provincia">
        </div>

        <div>
            <label for="cap">CAP</label>
            <input type="text" id="cap">
        </div>
    </div>

    <div class="grid-2">
        <div>
            <label for="forza_armata">Forza Armata</label>
            <select id="forza_armata"></select>
        </div>

        <div>
            <label for="servizio">Stato</label>
            <select id="servizio">
                <option value="">-- seleziona --</option>
                <option value="in_servizio">In servizio</option>
                <option value="in_quiescenza">In quiescenza</option>
                <option value="altro">Altro</option>
            </select>
        </div>
    </div>

    <div class="grid-1">
        <div>
            <label for="documento">Documento di riconoscimento (immagine o PDF)</label>
            <input type="file" id="documento" accept="image/*,application/pdf">
            <div id="previewDocumento" style="margin-top:10px; font-size:14px;"></div>
        </div>
    </div>

    <div class="grid-1">
        <div>
            <label for="foto">Foto tessera (max 3 MB)</label>
            <input type="file" id="foto" accept="image/*">
            <img id="previewFoto" alt="Anteprima foto">
        </div>
    </div>

    <!-- ============================
         SEZIONE FAMILIARI
    ============================= -->
    <div class="section-title">Nucleo Familiare</div>

    <div id="familiariContainer"></div>

    <button id="btnAggiungiFamiliare">Aggiungi familiare</button>

    <!-- ============================
         PULSANTE PRINCIPALE
    ============================= -->
    <button id="btnAzione">Seleziona una Forza Armata</button>

</div>

<script src="script.js"></script>
</body>
</html>
